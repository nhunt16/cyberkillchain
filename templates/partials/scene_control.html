<div class="scene" data-scene="control"
     data-victim-ip="{{ lesson.body.victim_ip }}"
     data-attacker-ip="{{ lesson.body.attacker_ip }}">
  <div class="scene-stage">
    <div class="control-grid">
      <div class="mockup-window mockup-window--terminal">
        <div class="mockup-titlebar mockup-titlebar--dark">
          <span class="dot dot--red"></span><span class="dot dot--yellow"></span><span class="dot dot--green"></span>
          <div class="mockup-url">System Activity Monitor</div>
        </div>
        <div class="mockup-body mockup-body--install">
          <div class="install-log" id="controlLog">
            <div class="install-empty">Waiting for attacker activity…</div>
          </div>
          <div class="install-fs" id="controlFs">
            <div class="install-fs-header">File System Changes</div>
            <div class="install-fs-tree" id="controlTree"></div>
          </div>
        </div>
      </div>
      <div class="control-c2-wrap">
        <div class="c2-layout">
          <div class="c2-endpoint c2-endpoint--victim">
            <div class="c2-machine">
              <svg width="48" height="40" viewBox="0 0 48 40" fill="none"><rect x="4" y="2" width="40" height="28" rx="3" stroke="currentColor" stroke-width="1.5"/><line x1="14" y1="34" x2="34" y2="34" stroke="currentColor" stroke-width="1.5"/><line x1="24" y1="30" x2="24" y2="34" stroke="currentColor" stroke-width="1.5"/></svg>
            </div>
            <span class="c2-label">Victim Machine</span>
            <span class="c2-ip">{{ lesson.body.victim_ip }}</span>
          </div>
          <div class="c2-channel" id="controlChannel">
            <div class="c2-wire"><div class="c2-wire-line"></div></div>
            <div class="c2-packets" id="controlPackets"></div>
            <div class="c2-label-encrypted">AES-256 Encrypted</div>
          </div>
          <div class="c2-endpoint c2-endpoint--attacker">
            <div class="c2-machine c2-machine--bad">
              <svg width="48" height="40" viewBox="0 0 48 40" fill="none"><rect x="4" y="2" width="40" height="28" rx="3" stroke="currentColor" stroke-width="1.5"/><line x1="14" y1="34" x2="34" y2="34" stroke="currentColor" stroke-width="1.5"/><line x1="24" y1="30" x2="24" y2="34" stroke="currentColor" stroke-width="1.5"/></svg>
            </div>
            <span class="c2-label">C2 Server</span>
            <span class="c2-ip">{{ lesson.body.attacker_ip }}</span>
          </div>
        </div>
        <div class="c2-console" id="controlConsole">
          <div class="mockup-titlebar mockup-titlebar--dark">
            <span class="dot dot--red"></span><span class="dot dot--yellow"></span><span class="dot dot--green"></span>
            <div class="mockup-url">Attacker Console</div>
          </div>
          <div class="mockup-body mockup-body--terminal c2-console-body" id="controlTerminal">
            <div class="term-line visible term-placeholder">meterpreter&gt; <span class="term-caret">_</span></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="scene-actions" data-scene-actions="control">
    <button class="scene-action-btn primary" data-action="install" type="button">
      <span class="scene-action-num">1</span> Install Persistence
    </button>
    <button class="scene-action-btn" data-action="beacon" type="button" disabled>
      <span class="scene-action-num">2</span> Open C2 Channel
    </button>
    <button class="scene-action-btn" data-action="execute" type="button" disabled>
      <span class="scene-action-num">3</span> Send Commands
    </button>
    <button class="scene-action-btn scene-action-btn--ghost" data-action="reset" type="button" disabled>
      &#8635; Reset
    </button>
    <span class="scene-hint" data-scene-hint>Run each step to watch persistence get planted and the backdoor come alive.</span>
  </div>
</div>
