{# Challenge 3 · Defend the Network (interactive simulation)
   Timeline + scenario area are rendered by static/js/quiz.js once
   the user clicks Start Simulation; a waiting placeholder is shown
   until then. #}
<div class="defend-arena anim-fade-up visible" id="defendArena">
  <div class="defend-timeline" id="defendTimeline"></div>
  <div class="defend-scenario" id="defendScenario">
    <div class="defend-waiting">Click <strong>Start Simulation</strong> to begin</div>
  </div>
  <button type="button" class="defend-start-btn" id="defendStartBtn">
    <span class="defend-start-icon">&#9889;</span>
    Start Simulation
  </button>
</div>
