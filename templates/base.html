<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ meta.title }}{% endblock %}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=flask9">
</head>
<body class="app-body {% block body_class %}{% endblock %}">

  <div class="progress-bar" id="progressBar"></div>

  <nav class="nav" id="nav">
    <div class="nav-inner">
      <a href="{{ url_for('home') }}" class="nav-logo">
        <span class="nav-logo-icon">&#9632;</span>
        Cyber Kill Chain
      </a>
      <div class="nav-links">
        {% block nav_links %}
        <a href="{{ url_for('home') }}" class="nav-link">Home</a>
        <a href="{{ url_for('learn', n=1) }}" class="nav-link">Lessons</a>
        <a href="{{ url_for('quiz', n=1) }}" class="nav-link nav-link--cta">Quiz</a>
        {% endblock %}
      </div>
    </div>
  </nav>

  <main class="app-main">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <div class="container">
      <p>{{ meta.course }} · Cyber Kill Chain Educational Module</p>
      <p class="footer-credit">{{ meta.credit }}</p>
    </div>
  </footer>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script src="{{ url_for('static', filename='js/site.js') }}?v=flask2"></script>
  <script src="{{ url_for('static', filename='js/mascot.js') }}?v=flask1"></script>
  <script src="{{ url_for('static', filename='js/scenes.js') }}?v=flask1"></script>
  <script src="{{ url_for('static', filename='js/quiz.js') }}?v=flask1"></script>
  <script src="{{ url_for('static', filename='js/cyber-bg.js') }}?v=flask6"></script>

  {% block extra_scripts %}{% endblock %}
</body>
</html>
