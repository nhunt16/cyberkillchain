<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ meta.title }}{% endblock %}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=flask36">
</head>
<body class="app-body {% block body_class %}{% endblock %}"
      data-active-avatar="{{ active_avatar.id }}">

  <div class="progress-bar" id="progressBar"></div>

  <nav class="nav" id="nav">
    <div class="nav-inner">
      <a href="{{ url_for('home') }}" class="nav-logo">
        <span class="nav-logo-icon" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Left ear -->
            <path d="M2.5 11.5 L5.5 2.5 L10 9.5" stroke="white" stroke-width="1.5" stroke-linejoin="round"/>
            <!-- Right ear -->
            <path d="M10 9.5 L14.5 2.5 L17.5 11.5" stroke="white" stroke-width="1.5" stroke-linejoin="round"/>
            <!-- Head arc -->
            <path d="M2.5 11.5 Q2 17.5 10 19.5 Q18 17.5 17.5 11.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
            <!-- Inner ear marks -->
            <path d="M5 10.5 L6.5 5 L8.5 9" stroke="white" stroke-width="1" stroke-linejoin="round" opacity="0.55"/>
            <path d="M11.5 9 L13.5 5 L15 10.5" stroke="white" stroke-width="1" stroke-linejoin="round" opacity="0.55"/>
            <!-- Eyes -->
            <circle cx="7.5" cy="14.5" r="1.2" fill="white"/>
            <circle cx="12.5" cy="14.5" r="1.2" fill="white"/>
          </svg>
        </span>
        Cyber Kill Chain
      </a>
      <div class="nav-links">
        {% block nav_links %}
        <a href="{{ url_for('home') }}" class="nav-link">Home</a>
        <a href="{{ url_for('learn', n=1) }}" class="nav-link">Lessons</a>
        <a href="{{ url_for('avatars_page') }}" class="nav-link">Avatars</a>
        <a href="{{ url_for('quiz', n=1) }}" class="nav-link nav-link--cta">Quiz</a>
        {% endblock %}
      </div>
    </div>
  </nav>

  <main class="app-main">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <div class="container">
      <p>{{ meta.course }} · Cyber Kill Chain Educational Module</p>
      <p class="footer-credit">{{ meta.credit }}</p>
    </div>
  </footer>

  <script>
    window.__ACTIVE_AVATAR__ = {{ active_avatar.id | tojson }};
    window.__ACTIVE_AVATAR_NAME__ = {{ active_avatar.name | tojson }};
    window.__ACTIVE_AVATAR_POSES__ = {{ (active_avatar.pose_prefix or 'mascot') | tojson }};
    window.__MASCOT_ASSET_BASE__ = {{ url_for('static', filename='assets/') | tojson }};
  </script>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script src="{{ url_for('static', filename='js/site.js') }}?v=flask2"></script>
  <script src="{{ url_for('static', filename='js/mascot.js') }}?v=flask3"></script>
  <script src="{{ url_for('static', filename='js/scenes.js') }}?v=flask12"></script>
  <script src="{{ url_for('static', filename='js/quiz.js') }}?v=flask4"></script>
  <script src="{{ url_for('static', filename='js/battle.js') }}?v=flask11"></script>
  <script src="{{ url_for('static', filename='js/avatars.js') }}?v=flask2"></script>
  <script src="{{ url_for('static', filename='js/cyber-bg.js') }}?v=flask6"></script>

  {% block extra_scripts %}{% endblock %}
</body>
</html>
